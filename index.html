<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi To-Do List Bisnis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Daftar Tugas Bisnis</h2>

            <button onclick="tambahTugas()">Tambah</button>
        </div>

        <ul id="todo-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
